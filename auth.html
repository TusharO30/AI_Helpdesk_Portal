<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0a0e17;
            --card-bg: #172031;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #0c6dfd;
            --primary-hover: #0056b3;
            --input-bg: #0a0e17;
            --input-border: #1e293b;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .auth-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--input-border);
        }

        .logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .logo i { color: var(--primary); margin-right: 8px; }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--input-border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            margin-bottom: -2px;
        }

        /* Forms */
        .form-group { margin-bottom: 20px; }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--primary); }

        button.submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        button.submit-btn:hover { background: var(--primary-hover); }

        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .error-msg { color: #ef4444; font-size: 0.85rem; text-align: center; margin-top: 15px; min-height: 20px;}
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo"><i class="fas fa-robot"></i> Company Helpdesk</div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="login-form" class="form-section active">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="submit-btn" onclick="handleLogin()">Sign In</button>
            <div id="login-error" class="error-msg"></div>
        </div>

        <div id="signup-form" class="form-section">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Account Role</label>
                <select id="signup-role">
                    <option value="user">Employee (Standard User)</option>
                    <option value="admin">IT/HR Admin</option>
                </select>
            </div>
            <button class="submit-btn" onclick="handleSignup()">Create Account</button>
            <div id="signup-error" class="error-msg"></div>
        </div>
    </div>

    <script>
// We will replace this with your actual Render URL in Phase 2
        const API_URL = 'https://my-helpdesk-backend.onrender.com';        

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
            
            if(tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('signup-form').classList.add('active');
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const role = document.getElementById('signup-role').value;
            const errorDiv = document.getElementById('signup-error');

            if(!name || !email || !password) {
                errorDiv.innerText = "Please fill in all fields.";
                return;
            }

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert("Account created! Please sign in.");
                    switchTab('login');
                } else {
                    errorDiv.innerText = data.error || "Registration failed.";
                }
            } catch(e) {
                errorDiv.innerText = "Server connection error.";
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if(!email || !password) {
                errorDiv.innerText = "Please enter email and password.";
                return;
            }

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if(res.ok) {
                    // Save the user data and token in localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('userName', data.name);

                    // Redirect based on role
                    if(data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'user.html';
                    }
                } else {
                    errorDiv.innerText = data.error || "Invalid credentials.";
                }
            } catch(e) {
                errorDiv.innerText = "Server connection error.";
            }
        }
    </script>
</body>
</html>
