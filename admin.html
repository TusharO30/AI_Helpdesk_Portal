<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Helpdesk | Admin Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Light Theme Variables */
            --bg-app: #f0f2f5;
            --sidebar: #ffffff;
            --card: #ffffff;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --accent: #4361ee;
            --accent-soft: #eef2ff;
            --border: #e4e6eb;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body.dark-mode {
            /* Dark Theme Variables */
            --bg-app: #0b0e14;
            --sidebar: #151921;
            --card: #1c212c;
            --text-main: #f5f6f7;
            --text-muted: #90949c;
            --accent: #4cc9f0;
            --accent-soft: rgba(76, 201, 240, 0.1);
            --border: #2d333f;
            --glass: rgba(28, 33, 44, 0.7);
        }

        * { box-sizing: border-box; transition: background 0.3s ease, color 0.3s ease; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text-main);
            background: var(--bg-app);
        }

        /* Sidebar Navigation */
        nav {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            gap: 10px;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .stat-card h3 { margin: 0; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; }
        .stat-card .value { font-size: 2rem; font-weight: 700; margin-top: 10px; }

        /* Dashboard Panels */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .panel {
            background: var(--card);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .panel h2 { font-size: 1.25rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* Form Elements */
        textarea, input[type="text"] {
            width: 100%;
            background: var(--bg-app);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            color: var(--text-main);
            margin-bottom: 15px;
            resize: none;
        }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }

        .btn-primary { background: var(--accent); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); width: 100%; }

        /* List Items */
        .ticket-card, .lib-item {
            background: var(--bg-app);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }

        .lib-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: none;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
        }

        .theme-toggle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Overview</h1>
            <div style="display: flex; gap: 10px;">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="theme-toggle" onclick="logout()" style="color: #ef4444;" title="Log Out">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>🧠 AI Memory</h3>
                <div class="value" id="stat-knowledge">0</div>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid #ef4444;">
                <h3>⏳ In Queue</h3>
                <div class="value" id="stat-pending">0</div>
            </div>
            <div class="stat-card" style="border-bottom: 4px solid #10b981;">
                <h3>✅ Fixed</h3>
                <div class="value" id="stat-resolved">0</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Training Panel -->
            <div class="panel">
                <h2><i class="fas fa-graduation-cap" style="color:var(--accent)"></i> Training Lab</h2>
                <p style="color: var(--text-muted); font-size: 0.85rem;">Teach the AI new company policies or paste text.</p>
                <textarea id="docText" rows="4" placeholder="Paste manual or policy text here..."></textarea>
                <button class="btn-primary" onclick="uploadDoc()">
                    <i class="fas fa-cloud-upload-alt"></i> Inject Knowledge
                </button>
                <div style="margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.8rem;">OR</div>
                <input type="file" id="pdfInput" style="display: none;" onchange="updateFileName()">
                <button class="btn-outline" onclick="document.getElementById('pdfInput').click()">
                    <i class="fas fa-file-pdf"></i> <span id="fileName">Select PDF Document</span>
                </button>
                <button id="pdfUploadBtn" class="btn-primary" style="margin-top:10px; display:none; background: #10b981;" onclick="uploadPDF()">Upload PDF</button>
            </div>

            <!-- Tickets Panel -->
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2><i class="fas fa-comment-dots" style="color:#f59e0b"></i> Live Tickets</h2>
                    <button class="btn-outline" style="width:auto; padding: 5px 10px;" onclick="fetchTickets()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div id="ticketContainer" style="overflow-y: auto; height: 350px;"></div>
            </div>

            <!-- Library Panel -->
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2><i class="fas fa-database" style="color:#6366f1"></i> Brain Index</h2>
                    <button class="btn-outline" style="width:auto; padding: 5px 10px;" onclick="fetchLibrary()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div id="libraryContainer" style="overflow-y: auto; height: 350px;"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://helpdesk-ai-backend.onrender.com';
        // --- ADMIN AUTH GUARD ---
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        
        // Kick them out if they aren't logged in OR if they aren't an admin
        if (!token || role !== 'admin') {
            window.location.href = 'index.html';
        }

        // --- LOGOUT FUNCTION ---
        function logout() {
            localStorage.clear(); // Clears all saved data
            window.location.href = 'index.html';
        }

        // Upgraded toggle for Admin page
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('#themeBtn i');
            const isDark = document.body.classList.contains('dark-mode');
            
            if(isDark) {
                icon.className = 'fas fa-sun';
                localStorage.setItem('adminTheme', 'dark');
            } else {
                icon.className = 'fas fa-moon';
                localStorage.setItem('adminTheme', 'light');
            }
        }

        // Add this right before your window.onload to check memory on startup
        if (localStorage.getItem('adminTheme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('#themeBtn i').className = 'fas fa-sun';
        }

        function updateFileName() {
            const input = document.getElementById('pdfInput');
            const label = document.getElementById('fileName');
            const btn = document.getElementById('pdfUploadBtn');
            if(input.files.length > 0) {
                label.innerText = input.files[0].name;
                btn.style.display = 'flex';
            }
        }

        async function updateAnalytics() {
            try {
                const res = await fetch(`${API_URL}/analytics`);
                const data = await res.json();
                document.getElementById('stat-knowledge').textContent = data.knowledgeCount;
                document.getElementById('stat-pending').textContent = data.pending;
                document.getElementById('stat-resolved').textContent = data.resolved;
            } catch (e) { console.log("API not reached"); }
        }

        async function uploadDoc() {
            const text = document.getElementById('docText').value;
            if(!text) return;
            await fetch(`${API_URL}/upload-doc`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            document.getElementById('docText').value = "";
            refreshAll();
        }

        async function uploadPDF() {
            const fileInput = document.getElementById('pdfInput');
            const file = fileInput.files[0];
            if (!file) return alert("Please select a PDF first.");

            const uploadBtn = document.getElementById('pdfUploadBtn');
            const fileNameLabel = document.getElementById('fileName');
            
            // Visual feedback while uploading
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            uploadBtn.style.pointerEvents = 'none'; // Prevent double clicking

            const formData = new FormData();
            formData.append('pdfDocument', file);

            try {
                const res = await fetch(`${API_URL}/upload-pdf`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    // Show success message
                    alert("✅ Success: " + data.message);
                } else {
                    // Show error message from backend
                    alert("❌ Upload Failed: " + data.error);
                }
            } catch (e) {
                alert("❌ Network Error: Could not connect to the server.");
            } finally {
                // Reset the UI elements back to default
                fileInput.value = "";
                fileNameLabel.innerText = "Select PDF Document";
                uploadBtn.style.display = 'none';
                uploadBtn.innerHTML = 'Upload PDF';
                uploadBtn.style.pointerEvents = 'auto';
                
                // Refresh the library and stats to show the new data
                refreshAll();
            }
        }

        async function fetchTickets() {
            const res = await fetch(`${API_URL}/tickets`);
            const tickets = await res.json();
            const container = document.getElementById('ticketContainer');
            container.innerHTML = tickets.length ? "" : "<p style='text-align:center; color:var(--text-muted);'>No tickets found.</p>";
            tickets.forEach(t => {
                const div = document.createElement('div');
                div.className = "ticket-card";
                div.innerHTML = `
                    <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:5px;">User Question:</div>
                    <div style="font-weight:600; margin-bottom:10px;">${t.question}</div>
                    <textarea id="reply-${t._id}" placeholder="Type the correct answer to train AI..." rows="2"></textarea>
                    
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <button onclick="resolveTicket('${t._id}')" class="btn-primary" style="font-size:0.8rem; padding:8px; flex: 2;">
                            <i class="fas fa-check"></i> Resolve & Teach
                        </button>
                        <button onclick="cancelTicket('${t._id}')" class="btn-outline" style="font-size:0.8rem; padding:8px; flex: 1; border-color: #ef4444; color: #ef4444;">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        async function cancelTicket(id) {
            // 1. Ask for confirmation
            if(!confirm("Are you sure you want to delete this ticket without teaching the AI?")) return;
            
            try {
                // 2. Send the DELETE request
                const response = await fetch(`${API_URL}/tickets/${id}`, { 
                    method: 'DELETE' 
                });
                
                // 3. Check if the server successfully deleted it
                if (response.ok) {
                    refreshAll(); // Only refresh if the deletion was a success!
                } else {
                    // If the server threw an error, read it and alert the admin
                    const errorData = await response.json();
                    alert("Server Error: " + (errorData.error || "Could not delete ticket."));
                }
            } catch (e) {
                console.error("Network Error:", e);
                alert("Failed to connect to the server to delete the ticket.");
            }
        }

        async function resolveTicket(id) {
            const adminAnswer = document.getElementById(`reply-${id}`).value.trim();
            
            // Prevent submitting empty answers!
            if (!adminAnswer) {
                return alert("Please type an answer to teach the AI before resolving!");
            }

            try {
                await fetch(`${API_URL}/resolve-ticket`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticketId: id, adminAnswer })
                });
                refreshAll();
            } catch (e) {
                alert("Failed to resolve ticket.");
            }
        }

        async function fetchLibrary() {
            const res = await fetch(`${API_URL}/library`);
            const items = await res.json();
            const container = document.getElementById('libraryContainer');
            container.innerHTML = "";
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = "lib-item";
                div.innerHTML = `
                    <div style="font-size:0.85rem; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:200px;">
                        ${item.text}
                    </div>
                    <button onclick="deleteLib('${item._id}')" style="background:transparent; color:#ef4444; width:auto; border:none;">
                        <i class="fas fa-trash-alt"></i>
                    </button>`;
                container.appendChild(div);
            });
        }

        async function deleteLib(id) {
            if(!confirm("Delete this knowledge chunk?")) return;
            await fetch(`${API_URL}/library/${id}`, { method: 'DELETE' });
            refreshAll();
        }

        function refreshAll() {
            updateAnalytics();
            fetchTickets();
            fetchLibrary();
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
